# Cloud Build config for the hosted storytree-web Keystatic EDITOR image (ADR-0101 CD).
#
# Builds ./Dockerfile — the editor target (PUBLIC_STORYTREE_WEB_EDITOR=github, baked by the
# Dockerfile's `npm run build:editor`) — and pushes it to the shared `storytree` Artifact
# Registry repo. Consumed by .github/workflows/deploy-editor.yml. The manual fallback
# (parent repo infra/deploy-web-editor.sh) uses `gcloud run deploy --source` instead and does
# NOT use this file. Run from the repo root:
#   gcloud builds submit --config web-editor-cloudbuild.yaml --substitutions=_TAG=$(git rev-parse --short HEAD) .
substitutions:
  _TAG: manual
  _IMAGE: australia-southeast1-docker.pkg.dev/storytree-498613/storytree/web-editor
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_IMAGE}:${_TAG}"
      - "-t"
      - "${_IMAGE}:latest"
      - "."
images:
  - "${_IMAGE}:${_TAG}"
  - "${_IMAGE}:latest"
options:
  # Stream to Cloud Logging only (no per-build GCS logs bucket) — matches the studio recipe and
  # is why the deploy SA is granted logging.viewer (so `builds submit` can tail + report status).
  logging: CLOUD_LOGGING_ONLY
